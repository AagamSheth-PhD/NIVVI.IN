<!DOCTYPE html>
<html lang="en">
<head>

<body data-page="home">
  <!-- Sticky Navbar -->
  <header class="site-header">
    <nav class="navbar container" aria-label="Main Navigation">
      <a href="index.html" class="brand" aria-label="NIVVI.IN Home">
        <img src="images/nivvi logo.jpg" alt="NIVVI.IN Logo" class="brand-logo" />

      <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
